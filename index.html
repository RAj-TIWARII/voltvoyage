<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>voltvoyage.signup</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-image: url('https://cdn.discordapp.com/attachments/852854071026647071/1227271135033561119/wallpaperflare.com_wallpaper.jpg?ex=6627cc50&is=66155750&hm=77a257cb746abc13afb0d178e81382379a380af1cd33de812396a344721377b0&');
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
    }

    .container {
        width: 80%;
        max-width: 500px;
        margin: 10% auto;
        background-color: #b6b6b62d;
        border-radius: 8px;
        padding: 40px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.192);
    }

    .container h2 {
        text-align: center;
        margin-bottom: 59px;
    }

    .input-group {
        margin-bottom: 24px;
    }

    .input-group label {
        display: block;
        color: #000000;
    }

    .input-group input[type="text"],
    .input-group input[type="password"] {
        width: 100%;
        padding: 7px;
        border: 2px solid #3a6679;
        border-radius: 4px;
    }

    .user-icon {
        text-align: center;
    }

    .user-icon img {
        width: 90px;
        height: 90px;
        border-radius: 30%;
        cursor: pointer;
        margin-bottom: 10px;
    }

    .show-password {
        position: relative;
        cursor: pointer;
    }

    .show-password input[type="checkbox"] {
        position: absolute;
        top: 50%;
        right: 5px;
        transform: translateY(-50%);
        cursor: pointer;
        opacity: 0;
    }

    .show-password input[type="checkbox"] + label::after {
        content: url('https://img.icons8.com/material-outlined/24/000000/invisible--v1.png');
        position: absolute;
        top: 50%;
        right: -10px;
        transform: translateY(-50%);
        cursor: pointer;
    }

    .show-password input[type="checkbox"]:checked + label::after {
        content: url('https://img.icons8.com/material-rounded/24/000000/visible--v1.png');
    }

    button[type="submit"] {
        display: block;
        width: 100%;
        padding: 11px 10px;
        font-size: 14px;
        background-color: #3a6988;
        color: #fbfcff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    button[type="submit"]:hover {
        background-color: #1873fd;
    }

    /* New section for About us */
    .about-section {
        background-color: black;
        padding: 40px;
    }

    .about-section h2 {
        color: white;
        text-align: left;
        margin-bottom: 20px;
    }

    .about-section p {
        color: white;
        text-align: left;
        margin-bottom: 20px;
    }

    .social-icons {
        display: flex;
        align-items: center;
    }

    .social-icons a {
        margin-right: 25px;
        color: rgb(53, 204, 171);
        text-decoration: none;
    }

    /* Adjust size of social media icons */
    .social-icons img {
        width: 16px;
        height: 15px;
    }

    /* Password strength warning */
    .password-warning {
        font-size: 14px;
        color: rgb(224, 241, 239);
        margin-top: 5px;
    }

    /* Login link */
    .login-link {
        text-align: center;
        margin-top: 20px;
    }

    .login-link a {
        color: #3a6988;
        text-decoration: none;
    }
</style>
</head>
<body>

<div class="container">
    <h2>WELCOME HOME : )</h2>
    <div class="user-icon">
        <label for="profile-pic"><img src="https://cdn.discordapp.com/attachments/852854071026647071/1227839765722693683/Qi5qcGc.png?ex=6629dde4&is=661768e4&hm=b41f513425dbeee11f3cfc8d4e1b8d1b2dbbfcfc1c27915c76f8bc39bcd555e9&" alt="User Icon"></label>
        <input type="file" id="profile-pic" accept="image/*" style="display: none;">
    </div>
    <div class="input-group">
        <label for="username">USER</label>
        <input type="text" id="username" name="username" required>
    </div>
    <div class="input-group">
        <label for="password">PASSWORD</label>
        <div class="show-password">
            <input type="checkbox" id="showPassword">
            <label for="showPassword"></label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="password-warning" id="passwordWarning"></div>
    </div>
    <button type="submit">Sign Up</button>
    <div class="login-link">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<!-- About us section -->
<div class="about-section">
    <h2>About Us</h2>
    <p>I am a beginner developer and I do web development and programming in different languages like Python, JavaScript, Java, PHP, CSS, Rust, and more.</p>
    <div class="social-icons">
        <a href="https://twitter.com/Rajztiwari" target="_blank"><img src="https://cdn.discordapp.com/attachments/852854071026647071/1227999005619781683/ZS5wbmc.png?ex=662a7232&is=6617fd32&hm=f266f9dd93dab654dd278df7c97244d7ce86a09d38bed9f87d2d84936e63dec4" alt="Twitter Icon"></a>
        <a href="https://www.instagram.com/rajztiwari/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://github.com/RAj-TIWARII" target="_blank"><i class="fab fa-github"></i></a>
    </div>
    <p>Follow me on Twitter/  𝕏  , Instagram, and GitHub:</p>
</div>

<script>
    const showPasswordCheckbox = document.getElementById('showPassword');
    const passwordInput = document.getElementById('password');
    const passwordWarning = document.getElementById('passwordWarning');

    showPasswordCheckbox.addEventListener('change', function() {
        const isChecked = this.checked;
        if (isChecked) {
            passwordInput.type = 'text';
        } else {
            passwordInput.type = 'password';
        }
    });

    passwordInput.addEventListener('input', function() {
        const password = this.value;
        const hasNumber = /\d/.test(password);
        const hasSpecialChar = /[!@#$%^&*(),.?":{}|<>]/.test(password);
        const isStrong = password.length >= 8 && hasNumber && hasSpecialChar;

        if (!isStrong) {
            passwordWarning.textContent = 'Password should be at least 8 characters long and contain numbers and special characters.';
        } else {
            passwordWarning.textContent = '';
        }
    });

    // Redirect to login page after signup
    document.querySelector('button[type="submit"]').addEventListener('click', function() {
        window.location.href = 'login.html';
    });
</script>

</body>
</html>
